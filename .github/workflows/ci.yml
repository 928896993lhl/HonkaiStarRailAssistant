name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================
  # 代码质量检查
  # ============================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查 Pipeline JSON 格式
        continue-on-error: true
        run: |
          python3 scripts/check_resource.py 2>&1 | sed 's/^/  /'
          echo "WARNING: 仍有模板图片待截图，详见 docs/SRA资源复用分析.md"

      - name: 检查 interface.json 结构
        run: |
          python3 -c "
          import json
          with open('assets/interface.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          assert 'controller' in data, '缺少 controller'
          assert 'resource' in data, '缺少 resource'
          assert 'task' in data, '缺少 task'
          print(f'OK interface.json: version={data.get(\"version\", \"?\")}, tasks={len(data[\"task\"])}')
          "

  # ============================
  # Windows x86_64 构建
  # ============================
  build-windows-x64:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 获取版本号
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 下载 MaaFramework
        shell: powershell
        run: |
          $url = "https://github.com/MaaXYZ/MaaFramework/releases/latest/download/MaaFramework-win-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile maafw.zip
          Expand-Archive -Path maafw.zip -DestinationPath deps
          Remove-Item maafw.zip

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip

      - name: 运行 install.py
        run: |
          python install.py ${{ steps.version.outputs.version }}

      - name: 打包发布包
        shell: powershell
        run: |
          Compress-Archive -Path install/* -DestinationPath "HonkaiStarRailAssistant-win-x86_64-${{ steps.version.outputs.version }}.zip"

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HonkaiStarRailAssistant-win-x86_64-${{ steps.version.outputs.version }}
          path: HonkaiStarRailAssistant-win-x86_64-${{ steps.version.outputs.version }}.zip

  # ============================
  # 发布 Release
  # ============================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-windows-x64]
    steps:
      - uses: actions/checkout@v4

      - name: 获取版本号
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: HonkaiStarRailAssistant-win-x86_64-${{ steps.version.outputs.version }}

      - name: 提取 CHANGELOG
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            cat CHANGELOG.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=Release ${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            HonkaiStarRailAssistant-win-x86_64-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
